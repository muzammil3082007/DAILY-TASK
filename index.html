<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenTask Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-zinc-950 text-slate-900 dark:text-zinc-100 font-['Inter'] overflow-hidden">

    <!-- App Container (Swipeable) -->
    <div id="app-slider" class="flex transition-transform duration-500 ease-out h-screen w-[300vw]">
        
        <!-- PAGE 1: TASKS -->
        <section class="w-screen h-full overflow-y-auto px-6 pt-12 pb-24">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">My Tasks</h1>
                    <p class="text-slate-500 dark:text-zinc-400" id="current-date"></p>
                </div>
                <button id="add-task-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white p-4 rounded-2xl shadow-lg transition-transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
                </button>
            </header>

            <div id="task-list" class="space-y-4">
                <!-- Tasks injected here -->
            </div>
        </section>

        <!-- PAGE 2: ANALYTICS -->
        <section class="w-screen h-full overflow-y-auto px-6 pt-12 pb-24 bg-white dark:bg-zinc-900/50">
            <h2 class="text-3xl font-bold mb-6 text-center">Insights</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="glass-card p-4 rounded-3xl text-center">
                    <span class="text-sm text-slate-500">Completed</span>
                    <p id="stat-completed" class="text-2xl font-bold text-indigo-500">0</p>
                </div>
                <div class="glass-card p-4 rounded-3xl text-center">
                    <span class="text-sm text-slate-500">Streak</span>
                    <p id="stat-streak" class="text-2xl font-bold text-orange-500">0🔥</p>
                </div>
            </div>
            <div class="glass-card p-6 rounded-3xl mb-6">
                <canvas id="productivityChart"></canvas>
            </div>
        </section>

        <!-- PAGE 3: SETTINGS -->
        <section class="w-screen h-full overflow-y-auto px-6 pt-12 pb-24">
            <h2 class="text-3xl font-bold mb-8">Settings</h2>
            <div class="space-y-6">
                <div class="flex items-center justify-between p-4 glass-card rounded-2xl">
                    <span>Dark Mode</span>
                    <input type="checkbox" id="theme-toggle" class="w-10 h-5 appearance-none bg-slate-300 rounded-full relative cursor-pointer checked:bg-indigo-600 transition-all">
                </div>
                <button id="export-data" class="w-full p-4 glass-card rounded-2xl text-left hover:bg-indigo-50">Export Backup (JSON)</button>
                <button id="reset-data" class="w-full p-4 glass-card rounded-2xl text-left text-red-500">Clear All Data</button>
            </div>
        </section>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border border-white/20 rounded-full px-8 py-4 shadow-2xl flex justify-between items-center z-50">
        <button onclick="slideTo(0)" class="nav-item active"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
        <button onclick="slideTo(1)" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg></button>
        <button onclick="slideTo(2)" class="nav-item"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </nav>

    <!-- Modal for New Task -->
    <div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden items-end justify-center sm:items-center p-4">
        <div class="bg-white dark:bg-zinc-900 w-full max-w-lg rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 slide-up">
            <h3 class="text-xl font-bold mb-6">New Task</h3>
            <input type="text" id="task-input" placeholder="What needs to be done?" class="w-full bg-slate-100 dark:bg-zinc-800 p-4 rounded-2xl mb-4 outline-none focus:ring-2 ring-indigo-500">
            <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                <input type="datetime-local" id="task-datetime" class="bg-slate-100 dark:bg-zinc-800 p-3 rounded-xl text-sm">
                <select id="task-priority" class="bg-slate-100 dark:bg-zinc-800 p-3 rounded-xl text-sm">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 p-4 rounded-2xl font-semibold">Cancel</button>
                <button onclick="saveTask()" class="flex-1 bg-indigo-600 text-white p-4 rounded-2xl font-semibold shadow-lg">Save Task</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
